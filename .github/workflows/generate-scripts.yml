name: ScriptBuilder — Generate Scripts

on:
  workflow_dispatch:
    inputs:
      campaign_hooks:
        description: "Campaign hooks / angles this week (optional)"
        required: false
        default: ""
      extra_ideas:
        description: "Extra ideas or topics (optional)"
        required: false
        default: ""

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Generate scripts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          CAMPAIGN_HOOKS: ${{ github.event.inputs.campaign_hooks }}
          EXTRA_IDEAS: ${{ github.event.inputs.extra_ideas }}
        run: node generate-scripts.js
