name: TweetDraft — Post Scheduled Tweets

on:
  schedule:
    - cron: "0 9,12,15,18 * * *"  # runs at 9am, 12pm, 3pm, 6pm UTC — matches the 4 default time slots
  workflow_dispatch:                # manual trigger for testing

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write               # needed to update queue.json after posting

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm install

      - name: Post due approved tweets
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node poster.js
